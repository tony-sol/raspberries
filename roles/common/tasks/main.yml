---
- name: Gathering facts
  setup:
    filter:
      - ansible_device_links
      - ansible_memory_mb
      - ansible_user_id
      - ansible_user_uid

- name: Enable modprobes
  become: true
  loop: "{{ common_modprobes + common_modprobes_extras }}"
  modprobe:
    name: "{{ item }}"
    state: present
    persistent: present

- name: Setup apt configs
  become: true
  copy:
    src: "{{ src }}"
    dest: "/{{ src }}"
    mode: 0644
  when: path is exists
  vars:
    src: etc/apt/
    path: "{{ role_path }}/files/{{ src }}"

- name: Setup sudoers configs
  become: true
  copy:
    src: "{{ src }}"
    dest: "/{{ src }}"
    mode: 0440
  when: path is exists
  vars:
    src: etc/sudoers.d/
    path: "{{ role_path }}/files/{{ src }}"

- name: Setup systemd environment configs
  become: true
  copy:
    src: "{{ src }}"
    dest: "/{{ src }}"
    mode: 0440
  when: path is exists
  vars:
    src: etc/environment.d/
    path: "{{ role_path }}/files/{{ src }}"

- name: Setup global environment
  become: true
  lineinfile:
    path: /etc/environment
    regexp : "(?i)^{{ item.key }}="
    line: "{{ item.key | upper }}={{ item.value }}"
  loop: "{{ common_environment | combine(common_environment_extras) | dict2items }}"

- name: Enable required sysctl parameters
  become: true
  loop: "{{ common_sysctl_parameters | combine(common_sysctl_parameters_extras) | dict2items }}"
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/90-net.conf
    reload: true

- name: Install locales
  become: true
  locale_gen:
    name:
      - en_US.UTF-8
      - ru_RU.UTF-8
    state: present

- name: Install packages
  become: true
  loop: "{{ common_packages + common_packages_extras }}"
  package:
    name: "{{ item }}"
    state: latest

- name: Turn off swap
  become: true
  command:
    cmd: swapoff -a
    removes: /var/swap
  when: ansible_memory_mb.swap.total > 0

- name: Ensure no swap in fstab
  become: true
  mount:
    name: swap
    fstype: swap
    state: absent

- name: Ensure no swapfile
  become: true
  file:
    path: /var/swap
    state: absent

- name: Ensure swap.target masked
  become: true
  systemd_service:
    name: swap.target
    enabled: false
    state: stopped
    masked: true

- set_fact:
    disks: "{{ disks | default([]) + dict(ansible_device_links.uuids[item] | zip(ansible_device_links.labels[item])) | dict2items(key_name='uuid', value_name='label') }}"
  when: item.startswith('sd') or item.startswith('nvme')
  loop: "{{ ansible_device_links.uuids.keys() }}"

- name: Add disks into fstab
  become: true
  loop: "{{ disks }}"
  mount:
    state: mounted
    # @todo migrate uuid > partuuid
    src: "UUID={{ item.uuid }}"
    # @todo migrate label > partlabel
    path: "/mnt/{{ item.label }}"
    fstype: exfat
    opts: defaults,users,nofail
    dump: 0
    passno: 0
  notify: remount

- name: Ensure lingering enabled
  become: false
  command:
    cmd: "loginctl enable-linger {{ ansible_user_uid }}"
    creates: "/var/lib/systemd/linger/{{ ansible_user_id }}"

- name: Fetch current cmdline.txt
  slurp:
    src: "{{ common_cmdline_path }}"
  register: _cmdline

- name: Populate cmdline.txt with modules
  set_fact:
    cmdline: "{{ cmdline + [item] }}"
  when:
    - _cmdline is defined
    - _cmdline != ""
    - item not in cmdline
  loop: "{{ common_kernel_modules }}"
  vars:
    cmdline: "{{ _cmdline.content | b64decode | split }}"

- name: Write into cmdline
  become: true
  copy:
    content: "{{ cmdline | join(' ') }}\n"
    dest: "{{ common_cmdline_path }}"
  when: cmdline is defined
  notify: reboot
